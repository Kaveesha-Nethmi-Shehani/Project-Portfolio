<body>

    <div class="contact-page">
        <p>
            <span class="highlight">Get in touch </span><br>
            Open for freelance projects & full-time roles</p>
        <div class="main-content-wrapper">

        <div class="details">
            <div class="input-group">
            <label for="name">NAME</label>
            <input type="text" id="name" name="cus-name" placeholder="E.g.Jhosen">
        </div>

            <div class="input-group">
                <label for="email">EMAIL</label>
                <input type="text" id="email" name="cus-mail" placeholder="E.g.Jhosengosling@gmail.com">
            </div>

            <div class="input-textarea">
                <label for="address">ADDRESS</label>
                <textarea type="text" id="address" name="cus-address" placeholder="E.g.New zealand" cols="50" rows="10"></textarea>
            </div>

            <div class="input-group">
                <button type="submit" id="submit" class="submit-btn">Submit</button>
            </div>
        </div>


            <div class="social-section">
        <div class="social-links-container">
            <a href="https://github.com" target="_blank" class="contact-link">

            <div class="contact-item">
                    <div class="icon-circle"> <img src="../assets/github.png" alt="github" style="width: 80px; height: 80px">
                    </div>
                </div>
            </a>

            <a href="https://www.linkedin.com/feed/" target="_blank" class="contact-link">

                <div class="contact-item">
                    <div class="icon-circle"> <img src="../assets/linkeding.png" alt="linkedin" style="width: 80px; height: 80px">
                    </div>

                </div>
            </a>

            <a href="https://mail.google.com/mail/u/0/?hl=en#inbox" target="_blank" class="contact-link">

                <div class="contact-item">
                    <div class="icon-circle"> <img src="../assets/mail.png" alt="mail" style="width: 80px; height: 80px">
                    </div>

                </div>
            </a>

            <a href="https://wa.me/94771642297? text=Greetings!%20I%20visited%20your%20portfolio%20and%20I%20have%20a%20project%20inquiry.%20Can%20we%20have%20a%20quick%20chat%20about%20a%20collaboration?" target="_blank" class="contact-link">

                <div class="contact-item">
                    <div class="icon-circle"> <img src="../assets/whats  app.png" alt="whats app" style="width: 80px; height: 80px">
                    </div>

                </div>
            </a>


        </div>

            </div>
                </div>


            </div>










        </div>
